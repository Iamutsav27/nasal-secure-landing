<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App - Local Storage</title>
    <link rel="stylesheet" href="todo-styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📝 My Todo List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="stats-section">
            <div class="stat-item">
                <span class="stat-label">Total Tasks</span>
                <span class="stat-value" id="totalTasks">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Completed</span>
                <span class="stat-value completed" id="completedTasks">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Remaining</span>
                <span class="stat-value pending" id="remainingTasks">0</span>
            </div>
        </div>

        <!-- Todo List -->
        <div class="todo-list-container">
            <ul id="todoList" class="todo-list">
                <!-- Todos will be added here -->
            </ul>
            <div id="emptyState" class="empty-state">
                <p>🎉 No tasks yet! Start by adding one above.</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button id="clearCompleted" class="btn btn-secondary">Clear Completed</button>
            <button id="clearAll" class="btn btn-danger">Clear All</button>
            <button id="downloadBtn" class="btn btn-primary">Download List</button>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
